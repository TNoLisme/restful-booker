name: CI/CD Gatekeeper

on:
  push:
    paths:
      - 'app-code/**'
  pull_request:
    paths:
      - 'app-code/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Start Restful-Booker Server
        run: |
          cd app-code
          npm install
          npm start &
          sleep 5

      - name: Setup Java & Maven
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Karate Regression Tests
        run: |
          cd karate-automation
          mvn clean test
